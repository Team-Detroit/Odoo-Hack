version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: odoo_cafe_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: odoo_cafe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: odoo_cafe_backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:postgres123@db:5432/odoo_cafe?schema=public"
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: "supersecret"
      FRONTEND_URL: "http://localhost"
    depends_on:
      - db
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: odoo_cafe_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
